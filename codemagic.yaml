# Codemagic CI/CD config — La Polla Colombiana (iOS)
#
# Pipeline: build IPA + auto-publish a TestFlight.
#
# Funcionamiento general:
# - La app es un wrapper Capacitor de https://lapollacolombiana.com.
# - Por eso NO necesitamos buildear Next.js acá. Solo sync Capacitor
#   (para que el `ios/App/App/capacitor.config.json` esté al día) y
#   compilar el .ipa en Xcode.
# - Versionado: usamos $BUILD_NUMBER de Codemagic (auto-incrementa por
#   build, único dentro del proyecto). Cero dependencia de config de
#   Apple → no necesitamos el numeric App ID a mano.
#
# ─── SETUP REQUERIDO EN CODEMAGIC (una vez, en la UI) ────────────────
# 1. App Store Connect API key como INTEGRACIÓN:
#       Team settings → Team integrations → Developer Portal → Add key
#    Nombre EXACTO: codemagic_asc_key
#
# 2. Code signing identities (cuenta Apple nueva = sin cert/profile):
#       Team settings → Code signing identities
#    a. iOS certificates → Generate certificate
#         type: Apple Distribution  (usa la API key)
#    b. iOS provisioning profiles → Generate profile
#         bundle id: com.lapollacolombiana.app
#         type: App Store
#         certificate: el Apple Distribution recién creado
#    → Debe quedar un check verde. ESTE paso es el que faltaba en los
#      builds 1-3: el bloque `ios_signing` de abajo FETCHEA el cert +
#      profile, no los crea. Tienen que existir primero.
#
# Prerequisitos del lado de Apple:
# - Bundle ID `com.lapollacolombiana.app` en Apple Developer Portal.
# - App creada en App Store Connect con ese Bundle ID.
#
# Trigger: manual. Para auto-build en push a main, descomentar
# `triggering`.

workflows:
  ios-workflow:
    name: iOS · La Polla → TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 60

    # API key — autentica el fetch de signing files + el publish.
    integrations:
      app_store_connect: codemagic_asc_key

    environment:
      # Code signing automático de Codemagic: con la integración de
      # arriba + este bloque, Codemagic FETCHEA el distribution cert +
      # el provisioning profile App Store que generaste en la UI
      # (Code signing identities) y los pone en la build machine.
      # `xcode-project use-profiles` (en scripts) los aplica al .xcodeproj.
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.lapollacolombiana.app
      vars:
        # Capacitor 8 con SPM genera App.xcodeproj — NO App.xcworkspace
        # (el .xcworkspace lo generaba CocoaPods, que ya no usamos).
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
      node: 22.22.3
      xcode: latest

    # triggering:
    #   events:
    #     - push
    #   branch_patterns:
    #     - pattern: main
    #       include: true
    #   watched_file_patterns:
    #     - "ios/**"
    #     - "capacitor.config.ts"
    #     - "package.json"
    #     - "codemagic.yaml"

    scripts:
      - name: Install npm dependencies
        script: npm ci

      # Capacitor 8 usa SPM (Swift Package Manager). Cero CocoaPods.
      - name: Sync Capacitor iOS
        script: npx cap sync ios

      # Aplica al .xcodeproj los signing files que Codemagic fetcheó
      # via el bloque environment.ios_signing. Patrón idéntico al sample
      # oficial de Codemagic para Capacitor.
      - name: Set up code signing
        script: xcode-project use-profiles

      # Versionado: $BUILD_NUMBER lo provee Codemagic y auto-incrementa
      # por cada build. iOS/TestFlight solo exige que CFBundleVersion
      # suba — no necesita coincidir con el versionCode de Android.
      - name: Set build number
        script: |
          cd "$CM_BUILD_DIR/ios/App"
          agvtool new-version -all "$BUILD_NUMBER"

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project "$CM_BUILD_DIR/$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      app_store_connect:
        # auth: integration → usa la integración codemagic_asc_key.
        auth: integration
        submit_to_testflight: true
        # beta_groups:
        #   - Internal Testing
        submit_to_app_store: false
