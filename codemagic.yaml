# Codemagic CI/CD config — La Polla Colombiana (iOS)
#
# Pipeline: build IPA + auto-publish a TestFlight.
#
# Funcionamiento general:
# - La app es un wrapper Capacitor de https://lapollacolombiana.com.
# - Por eso NO necesitamos buildear Next.js acá. Solo sync Capacitor
#   (para que el `ios/App/App/capacitor.config.json` esté al día) y
#   compilar el .ipa en Xcode.
# - Versionado: usamos $BUILD_NUMBER de Codemagic (auto-incrementa por
#   build, único dentro del proyecto). Cero dependencia de config de
#   Apple → el primer build funciona sin tener el numeric App ID a mano.
#
# ─── SETUP REQUERIDO EN CODEMAGIC (una vez) ──────────────────────────
# 1. Subir la App Store Connect API key como INTEGRACIÓN (no env var):
#       Team settings → Team integrations → Developer Portal →
#       Manage keys → Add key.
#    Ponerle de nombre EXACTAMENTE: codemagic_asc_key
#    (Issuer ID + Key ID + archivo .p8).
# 2. Eso es todo. El step "Set up code signing" abajo usa esa key para
#    CREAR el distribution certificate + provisioning profile si no
#    existen (cuenta Apple nueva sin signing files previos).
#
# Prerequisitos del lado de Apple:
# - Bundle ID `com.lapollacolombiana.app` registrado en Apple Developer
#   Portal (Identifiers).
# - App creada en App Store Connect con ese Bundle ID.
#
# Trigger: manual (Start new build desde el dashboard). Para auto-build
# en push a main, descomentar el bloque `triggering`.

workflows:
  ios-workflow:
    name: iOS · La Polla → TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 60

    # Integración de App Store Connect API key. El nombre debe matchear
    # el que configuraste en Team integrations → Developer Portal.
    # Autentica los comandos `app-store-connect` del step de signing.
    integrations:
      app_store_connect: codemagic_asc_key

    environment:
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "com.lapollacolombiana.app"
      node: 22.22.3
      xcode: latest

    # Trigger manual por defecto. Descomentar para auto-build en push:
    # triggering:
    #   events:
    #     - push
    #   branch_patterns:
    #     - pattern: main
    #       include: true
    #   watched_file_patterns:
    #     # Solo dispara build cuando cambian cosas que afectan el binario
    #     # iOS — para cambios de la web sola NO hace falta nuevo build.
    #     - "ios/**"
    #     - "capacitor.config.ts"
    #     - "package.json"
    #     - "codemagic.yaml"

    scripts:
      - name: Install npm dependencies
        script: npm ci

      # Capacitor 8 usa SPM (Swift Package Manager). Cero CocoaPods.
      - name: Sync Capacitor iOS
        script: npx cap sync ios

      # Code signing automático desde cero:
      # - `keychain initialize` → keychain limpio en la build machine.
      # - `fetch-signing-files ... --create` → busca el distribution
      #   certificate + provisioning profile del bundle ID; si NO existen
      #   (cuenta Apple nueva), los CREA usando la API key. El flag
      #   --create es la diferencia clave vs el bloque environment.ios_signing,
      #   que solo fetchea y NO crea.
      # - `keychain add-certificates` → mete el cert descargado al keychain.
      # - `xcode-project use-profiles` → configura el .xcodeproj para
      #   firmar con el profile correcto.
      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles

      # Versionado: $BUILD_NUMBER lo provee Codemagic y auto-incrementa
      # por cada build. iOS/TestFlight solo exige que CFBundleVersion
      # suba — no necesita coincidir con el versionCode de Android.
      - name: Set build number
        script: |
          cd "$CM_BUILD_DIR/ios/App"
          agvtool new-version -all "$BUILD_NUMBER"

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "$CM_BUILD_DIR/$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      app_store_connect:
        # auth: integration → usa la integración codemagic_asc_key.
        # No hace falta repetir api_key / key_id / issuer_id acá.
        auth: integration

        # Sube a TestFlight automáticamente cuando el build pasa.
        submit_to_testflight: true
        # Grupos de beta testers a notificar. Crear un grupo
        # "Internal Testing" en App Store Connect → TestFlight y
        # descomentar. Sin esto el build llega a TestFlight igual,
        # solo que no notifica a un grupo.
        # beta_groups:
        #   - Internal Testing

        # NO sometemos auto a App Store Review. Eso se hace manual
        # desde App Store Connect cuando estemos listos:
        submit_to_app_store: false
