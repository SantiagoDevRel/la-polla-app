<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>La Polla Colombiana</title>
  <style>
    html,body{margin:0;padding:0;background:linear-gradient(180deg,#0a1628 0%,#080c10 30%,#080c10 100%);color:#F5F7FA;font-family:system-ui,sans-serif;height:100%;-webkit-text-size-adjust:100%}
    .wrap{display:grid;place-items:center;min-height:100dvh;text-align:center;padding:24px}
    .brand{font-size:11px;letter-spacing:.25em;font-weight:700;color:rgba(255,215,0,.6);text-transform:uppercase;margin-bottom:24px}
    h1{font-size:22px;text-transform:uppercase;letter-spacing:.05em;margin:0;color:#F5F7FA}
    p{font-size:13px;color:#AEB7C7;margin-top:12px;max-width:300px;margin-left:auto;margin-right:auto}
    button{margin-top:28px;border:none;background:#FFD700;color:#080c10;font-weight:700;letter-spacing:.04em;text-transform:uppercase;padding:12px 24px;border-radius:9999px;font-size:12px;cursor:pointer}
  </style>
</head>
<body>
  <div class="wrap">
    <div>
      <div class="brand">LA POLLA COLOMBIANA</div>
      <h1>Sin conexion</h1>
      <p>No pudimos contactar el servidor. Revisa tu internet y reintenta, parce.</p>
      <button onclick="location.reload()">Reintentar</button>
    </div>
  </div>
</body>
</html>
