# Email diario al admin con resumen de discrepancias activas.
#
# POST a /api/cron/admin-discrepancies-email todos los dias a las 13:00 UTC
# (8:00 AM Bogota, UTC-5) — temprano en la manana del admin.
# Solo envia email si hay items que reportar (matches sin verify, pollas
# trabadas, pollas ended sin payouts). Si todo OK, no spamea.

name: Admin Discrepancies Email Daily

on:
  schedule:
    # 13:00 UTC = 8:00 AM Bogota
    - cron: "0 13 * * *"
  workflow_dispatch: {}

jobs:
  email:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: POST a la API del email
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          APP_URL: ${{ secrets.APP_URL }}
        run: |
          : "${APP_URL:=https://lapollacolombiana.com}"
          if [ -z "$CRON_SECRET" ]; then
            echo "CRON_SECRET secret no configurado en repo settings"
            exit 1
          fi
          response=$(curl -sS -w "\nHTTP_STATUS:%{http_code}" -X POST \
            "$APP_URL/api/cron/admin-discrepancies-email" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json")
          body="${response%HTTP_STATUS:*}"
          status="${response##*HTTP_STATUS:}"
          echo "Status: $status"
          echo "Body: $body"
          if [ "$status" -ge 400 ]; then
            echo "Email cron failed with status $status"
            exit 1
          fi
