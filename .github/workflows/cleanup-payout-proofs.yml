# Cleanup semanal de TODOS los comprobantes (peer-to-peer + admin_collects)
# que tienen >=7 dias.
#
# POST a /api/cron/cleanup-payout-proofs los DOMINGOS a las 09:00 UTC
# (4:00 am Bogota). El endpoint borra todo lo que tiene uploaded_at /
# created_at >7 dias, asi que un comprobante subido cualquier dia de la
# semana queda esperando al domingo siguiente (vida 7-13 dias).
#
# Decision 2026-05-09: cron semanal en vez de diario porque (a) el costo
# Vercel es despreciable de cualquier forma (4 vs 30 inv/mes, ambos <0.05%
# free tier), (b) agrupar el cleanup en domingos hace el comportamiento
# mas predecible para el user.
#
# Free tier: GitHub Actions schedule en repos publicos.

name: Cleanup All Proofs Weekly (Sundays)

on:
  schedule:
    # 09:00 UTC domingo = 4:00 AM Bogota domingo
    - cron: "0 9 * * 0"
  workflow_dispatch: {}

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: POST a la API de cleanup
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          APP_URL: ${{ secrets.APP_URL }}
        run: |
          : "${APP_URL:=https://lapollacolombiana.com}"
          if [ -z "$CRON_SECRET" ]; then
            echo "CRON_SECRET secret no configurado en repo settings"
            exit 1
          fi
          response=$(curl -sS -w "\nHTTP_STATUS:%{http_code}" -X POST \
            "$APP_URL/api/cron/cleanup-payout-proofs" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json")
          body="${response%HTTP_STATUS:*}"
          status="${response##*HTTP_STATUS:}"
          echo "Status: $status"
          echo "Body: $body"
          if [ "$status" -ge 400 ]; then
            echo "Cleanup failed with status $status"
            exit 1
          fi
